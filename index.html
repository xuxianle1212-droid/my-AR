<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍一拍 - 智慧全息中医交互终端</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root {
            --neon: #AEE31B; /* 嫩绿色 */
            --glass: rgba(238, 253, 224, 0.12);
            --text-main: #EEFDE0;
        }

        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', 'PingFang SC', sans-serif; color: white; }

        /* 顶部标题栏 */
        .header { 
            position: absolute; top: 0; width: 100%; height: 65px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
            display: flex; justify-content: center; align-items: center; z-index: 100;
            border-bottom: 1px solid rgba(174, 227, 27, 0.3);
        }
        .header h1 { margin: 0; letter-spacing: 12px; font-weight: 300; font-size: 26px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* 左侧场景选择面板 */
        .scenarios-panel {
            position: absolute; left: 20px; top: 90px; width: 150px; z-index: 110;
        }
        .scenario-btn {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(174, 227, 27, 0.2); padding: 12px 15px;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
            text-align: left; font-size: 13px; color: var(--text-main); margin-bottom: 10px;
        }
        .scenario-btn:hover { background: rgba(174, 227, 27, 0.2); }
        .scenario-btn.active { background: var(--neon); color: #000; font-weight: bold; border-color: #fff; box-shadow: 0 0 15px var(--neon); }

        /* 右侧动态数据流 */
        .data-panel {
            position: absolute; right: 20px; top: 90px; width: 140px;
            font-family: 'Courier New', monospace; font-size: 10px; color: var(--neon);
            pointer-events: none; opacity: 0.8; z-index: 100; line-height: 1.6;
        }

        /* 结构化药方卡片 */
        #detail-card {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%) translateY(200%);
            width: 380px; background: rgba(10, 25, 10, 0.95); border: 2px solid var(--neon);
            padding: 22px; border-radius: 20px; backdrop-filter: blur(25px);
            transition: transform 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 200;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        #detail-card.show { transform: translateX(-50%) translateY(0); }
        .card-header { border-bottom: 2px solid var(--neon); padding-bottom: 8px; margin-bottom: 15px; }
        .card-header h3 { margin: 0; color: var(--neon); font-size: 22px; }
        
        .protocol-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .protocol-item { background: rgba(174, 227, 27, 0.1); padding: 10px; border-radius: 8px; font-size: 13px; border: 1px solid rgba(174, 227, 27, 0.05); }
        .protocol-label { color: var(--neon); display: block; margin-bottom: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        
        .massage-guide { margin-top: 15px; font-size: 14px; line-height: 1.6; color: #f0f0f0; border-left: 4px solid var(--neon); padding-left: 12px; font-style: italic; }

        #output_canvas { transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; }
        #input_video { display: none; }

        /* 动态扫描线 */
        .scan-line { 
            position: absolute; width: 100%; height: 3px; background: var(--neon); 
            box-shadow: 0 0 20px var(--neon); z-index: 5;
            animation: scan-anim 4s linear infinite; pointer-events: none;
        }
        @keyframes scan-anim { 0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body>

<div class="header"><h1>拍一拍</h1></div>
<div class="scan-line"></div>

<!-- 场景导航 -->
<div class="scenarios-panel">
    <div style="font-size:10px; color:var(--neon); margin-bottom:8px; opacity:0.6;">SCENARIO SELECT</div>
    <div class="scenario-btn active" onclick="selectScene('all', this)">全息扫描</div>
    <div class="scenario-btn" onclick="selectScene('eye', this)">眼周舒缓</div>
    <div class="scenario-btn" onclick="selectScene('sleep', this)">深度安神</div>
    <div class="scenario-btn" onclick="selectScene('nose', this)">鼻息畅通</div>
    <div class="scenario-btn" onclick="selectScene('beauty', this)">焕颜提拉</div>
</div>

<!-- 实时流数据 -->
<div class="data-panel" id="data-panel">
    [BIO_SCANNER]<br>
    STATUS: ACTIVE<br>
    TRACKING: FACE_BODY<br>
    MERIDIAN: SYNCED
</div>

<!-- 专业引导卡片 -->
<div id="detail-card">
    <div class="card-header">
        <h3 id="p-name">穴位名称</h3>
    </div>
    <div class="info-section">
        <span style="font-size:12px; color:var(--neon); letter-spacing:1px;">[ 导引定位 ]</span>
        <div id="p-loc" style="font-size:15px; margin-top:5px; color:#fff;">...</div>
    </div>
    
    <div class="protocol-grid">
        <div class="protocol-item"><span class="protocol-label">推荐手法</span><span id="p-tech">加载中</span></div>
        <div class="protocol-item"><span class="protocol-label">建议力度</span><span id="p-press">加载中</span></div>
        <div class="protocol-item"><span class="protocol-label">引导时长</span><span id="p-dur">加载中</span></div>
        <div class="protocol-item"><span class="protocol-label">经络反馈</span><span>得气为度</span></div>
    </div>

    <div class="massage-guide" id="p-guide">请依照全息定位点进行精准点按。</div>
</div>

<video id="input_video" playsinline></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    let currentScene = 'all';
    let activeAcupoint = null;
    let lastResults = null;

    // 穴位大数据库（包含所有脸部及身体点）
    const ACUPOINTS = [
        // 头部/安神
        { scene: 'sleep', name: "印堂", index: 9, loc: "两眉正中凹陷处", tech: "拇指点按", press: "中等深度", dur: "3-5分钟", guide: "闭目养神，点按时产生微弱酸胀感并向上放射为佳。" },
        { scene: 'sleep', name: "神庭", index: 10, loc: "发际正中直上0.5寸", tech: "食指揉法", press: "轻柔为主", dur: "2分钟", guide: "顺时针揉动，可迅速缓解精神紧张和失眠。" },
        { scene: 'sleep', name: "头维", index: 21, loc: "发际角上0.5寸", tech: "指腹按压", press: "由轻渐重", dur: "3分钟", guide: "针对熬夜引起的头痛有显著缓解效果。" },
        
        // 眼周/舒缓
        { scene: 'eye', name: "左太阳", index: 251, loc: "眉尾外侧凹陷处", tech: "揉动法", press: "微感酸胀", dur: "5分钟", guide: "双手同时向后揉动，可疏风解表、止头痛。" },
        { scene: 'eye', name: "右太阳", index: 21, loc: "眉尾外侧凹陷处", tech: "揉动法", press: "微感酸胀", dur: "5分钟", guide: "双手同时向后揉动，可疏风解表、止头痛。" },
        { scene: 'eye', name: "左攒竹", index: 285, loc: "眉头骨骼边缘", tech: "垂直点按", press: "精准深入", dur: "2分钟", guide: "由下往上按压，针对视物模糊、眼睑下垂。" },
        { scene: 'eye', name: "右攒竹", index: 55, loc: "眉头骨骼边缘", tech: "垂直点按", press: "精准深入", dur: "2分钟", guide: "由下往上按压，针对视物模糊、眼睑下垂。" },
        { scene: 'eye', name: "左鱼腰", index: 282, loc: "眉毛中心点", tech: "横向拨动", press: "极轻柔", dur: "1分钟", guide: "轻轻横向拨动，可缓解眼球酸胀感。" },
        { scene: 'eye', name: "右鱼腰", index: 52, loc: "眉毛中心点", tech: "横向拨动", press: "极轻柔", dur: "1分钟", guide: "轻轻横向拨动，可缓解眼球酸胀感。" },
        { scene: 'eye', name: "左丝竹空", index: 446, loc: "眉梢凹陷处", tech: "指尖点揉", press: "中等", dur: "2分钟", guide: "主治偏头痛、目眩、视疲劳。" },
        { scene: 'eye', name: "右丝竹空", index: 226, loc: "眉梢凹陷处", tech: "指尖点揉", press: "中等", dur: "2分钟", guide: "主治偏头痛、目眩、视疲劳。" },
        { scene: 'eye', name: "左四白", index: 330, loc: "瞳孔直下眶下孔处", tech: "打圈揉法", press: "轻盈", dur: "3分钟", guide: "有助于改善黑眼圈，调理面部气血。" },
        { scene: 'eye', name: "右四白", index: 101, loc: "瞳孔直下眶下孔处", tech: "打圈揉法", press: "轻盈", dur: "3分钟", guide: "有助于改善黑眼圈，调理面部气血。" },
        
        // 鼻部/感冒
        { scene: 'nose', name: "左迎香", index: 358, loc: "鼻翼旁开0.5寸", tech: "侧压法", press: "持续受力", dur: "3分钟", guide: "按至局部发热，对鼻塞、流涕效果极佳。" },
        { scene: 'nose', name: "右迎香", index: 129, loc: "鼻翼旁开0.5寸", tech: "侧压法", press: "持续受力", dur: "3分钟", guide: "按至局部发热，对鼻塞、流涕效果极佳。" },
        
        // 美容/提拉
        { scene: 'beauty', name: "左巨髎", index: 345, loc: "瞳孔直下平鼻翼下缘", tech: "向上提按", press: "适中", dur: "4分钟", guide: "配合呼吸，向上提拉，可紧致苹果肌。" },
        { scene: 'beauty', name: "右巨髎", index: 116, loc: "瞳孔直下平鼻翼下缘", tech: "向上提按", press: "适中", dur: "4分钟", guide: "配合呼吸，向上提拉，可紧致苹果肌。" },
        { scene: 'beauty', name: "左地仓", index: 291, loc: "口角旁0.4寸", eff: "提拉口角", tech: "指尖固定", press: "轻柔", dur: "3分钟", guide: "预防口角下垂，改善面部表情肌。" },
        { scene: 'beauty', name: "右地仓", index: 61, loc: "口角旁0.4寸", eff: "提拉口角", tech: "指尖固定", press: "轻柔", dur: "3分钟", guide: "预防口角下垂，改善面部表情肌。" },
        { scene: 'beauty', name: "左颊车", index: 361, loc: "咀嚼肌隆起处", tech: "张口揉按", press: "深层发力", dur: "5分钟", guide: "放松咬肌，优化下颌线条。" },
        { scene: 'beauty', name: "右颊车", index: 132, loc: "咀嚼肌隆起处", tech: "张口揉按", press: "深层发力", dur: "5分钟", guide: "放松咬肌，优化下颌线条。" },
        { scene: 'beauty', name: "承浆", index: 18, loc: "下唇正中凹陷处", tech: "单点压法", press: "略重", dur: "2分钟", guide: "主治口歪流涎，有助于排毒养颜。" },

        // 身体（全显模式可见）
        { scene: 'body', name: "膻中", index: 'chest', loc: "胸骨正中两乳连线中点", tech: "掌心揉擦", press: "摩擦发热", dur: "5分钟", guide: "掌心对准该处横向揉擦，至胸部微微发热，宽胸理气。" },
        { scene: 'body', name: "左曲池", index: 14, loc: "肘横纹外侧端", tech: "拇指按揉", press: "沉重酸胀", dur: "3分钟", guide: "清热解表，对高血压、皮肤瘙痒有辅助调理作用。" },
        { scene: 'body', name: "右曲池", index: 13, loc: "肘横纹外侧端", tech: "拇指按揉", press: "沉重酸胀", dur: "3分钟", guide: "清热解表，对高血压、皮肤瘙痒有辅助调理作用。" }
    ];

    function selectScene(scene, btn) {
        currentScene = scene;
        document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        hideCard();
    }

    function onResults(results) {
        lastResults = results;
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.faceLandmarks) {
            drawCyberGrid(results.faceLandmarks);
            ACUPOINTS.forEach(p => {
                if (currentScene === 'all' || p.scene === currentScene || p.scene === 'body') {
                    drawMarker(results.faceLandmarks, results.poseLandmarks, p);
                }
            });
        }
        updateDataPanel();
        canvasCtx.restore();
    }

    function drawCyberGrid(landmarks) {
        canvasCtx.beginPath();
        canvasCtx.strokeStyle = "rgba(174, 227, 27, 0.12)";
        canvasCtx.lineWidth = 0.5;
        // 绘制更细密的扫描网格
        for (let i = 0; i < landmarks.length; i += 8) {
            const p = landmarks[i];
            canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height);
        }
        canvasCtx.stroke();
    }

    function drawMarker(faceLms, poseLms, data) {
        let x, y;
        if (data.index === 'chest') {
            const ls = poseLms[12]; const rs = poseLms[11];
            if(!ls || !rs) return;
            x = (ls.x + rs.x) / 2; y = (ls.y + rs.y) / 2 + 0.12;
        } else if (data.scene === 'body') {
            const lm = poseLms[data.index];
            if (!lm) return;
            x = lm.x; y = lm.y;
        } else {
            const lm = faceLms[data.index];
            if (!lm) return;
            x = lm.x; y = lm.y;
        }

        const px = x * canvasElement.width;
        const py = y * canvasElement.height;
        const isAct = activeAcupoint?.name === data.name;

        // 准心样式
        canvasCtx.strokeStyle = isAct ? "#fff" : "rgba(174, 227, 27, 0.8)";
        canvasCtx.lineWidth = isAct ? 3 : 1;
        
        canvasCtx.beginPath();
        canvasCtx.arc(px, py, isAct ? 8 : 5, 0, Math.PI * 2);
        canvasCtx.stroke();
        
        const s = isAct ? 12 : 8;
        canvasCtx.beginPath();
        canvasCtx.moveTo(px-s, py); canvasCtx.lineTo(px+s, py);
        canvasCtx.moveTo(px, py-s); canvasCtx.lineTo(px, py+s);
        canvasCtx.stroke();

        // 标签
        canvasCtx.save();
        canvasCtx.translate(px, py);
        canvasCtx.scale(-1, 1);
        canvasCtx.fillStyle = isAct ? "#fff" : varColor(data.scene);
        canvasCtx.font = isAct ? "bold 12px Arial" : "10px Arial";
        canvasCtx.fillText(data.name, isAct ? 15 : 10, 4);
        canvasCtx.restore();
    }

    function varColor(scene) {
        if (scene === currentScene) return "#AEE31B";
        return "rgba(255,255,255,0.4)";
    }

    // 精准吸附与空白取消
    canvasElement.addEventListener('click', (e) => {
        if (!lastResults) return;
        const rect = canvasElement.getBoundingClientRect();
        const clickX = (rect.right - e.clientX) * (canvasElement.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvasElement.height / rect.height);

        let nearest = null;
        let minDist = 55; // 吸附范围

        ACUPOINTS.forEach(p => {
            if (currentScene === 'all' || p.scene === currentScene || p.scene === 'body') {
                let lm;
                if (p.index === 'chest') {
                    const ls = lastResults.poseLandmarks[12]; const rs = lastResults.poseLandmarks[11];
                    if(ls && rs) lm = {x:(ls.x+rs.x)/2, y:(ls.y+rs.y)/2+0.12};
                } else if (p.scene === 'body') {
                    lm = lastResults.poseLandmarks?.[p.index];
                } else {
                    lm = lastResults.faceLandmarks?.[p.index];
                }

                if (lm) {
                    const dx = clickX - lm.x * canvasElement.width;
                    const dy = clickY - lm.y * canvasElement.height;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < minDist) { minDist = d; nearest = p; }
                }
            }
        });

        if (nearest) {
            activeAcupoint = nearest;
            showCard(nearest);
        } else {
            activeAcupoint = null;
            hideCard();
        }
    });

    function showCard(p) {
        document.getElementById('p-name').innerText = `>> ${p.name}_LOCK`;
        document.getElementById('p-loc').innerText = p.loc;
        document.getElementById('p-tech').innerText = p.tech;
        document.getElementById('p-press').innerText = p.press;
        document.getElementById('p-dur').innerText = p.dur;
        document.getElementById('p-guide').innerText = p.guide;
        document.getElementById('detail-card').classList.add('show');
    }

    function hideCard() {
        document.getElementById('detail-card').classList.remove('show');
    }

    function updateDataPanel() {
        if(lastResults && lastResults.faceLandmarks) {
            const p = lastResults.faceLandmarks[10];
            document.getElementById('data-panel').innerHTML = `
                [BIO_SCANNER]<br>
                X: ${p.x.toFixed(3)}<br>
                Y: ${p.y.toFixed(3)}<br>
                Z: ${p.z.toFixed(3)}<br>
                FOCUS: ${currentScene.toUpperCase()}
            `;
        }
    }

    const holistic = new Holistic({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}` });
    holistic.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
    holistic.onResults(onResults);
    new Camera(videoElement, { onFrame: async () => await holistic.send({image: videoElement}), width: 1280, height: 720 }).start();
</script>
</body>
</html>
