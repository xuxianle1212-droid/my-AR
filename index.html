<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>身体感知引导系统 - AR Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-three.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'PingFang SC', sans-serif; background: #000; }
        
        /* UI 引导层 */
        #ui-overlay {
            position: absolute; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; pointer-events: none;
            transition: opacity 1s;
        }

        .guide-text {
            color: rgba(255, 255, 255, 0.85);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            padding: 15px 30px;
            border-radius: 30px;
            margin: 40px 0;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-align: center;
            animation: fadeInOut 4s infinite ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #start-screen {
            position: absolute; inset: 0; z-index: 20;
            background: #fdfcf8; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        button {
            padding: 12px 40px; border: 1px solid #ccc; background: none;
            border-radius: 25px; font-size: 1rem; cursor: pointer; color: #666;
        }

        .status-msg { position: absolute; bottom: 10%; color: white; opacity: 0.7; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="font-weight: 300; color: #333;">身体感知引导</h2>
        <p style="color: #999; margin-bottom: 30px;">找一个安静的地方，放松站立</p >
        <button id="startButton">开启感知</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="guide-text" id="main-hint">跟随节奏呼吸</div>
        <div class="status-msg" id="sub-hint">轻轻感受身体变化</div>
    </div>

    <script type="module">
        const THREE = window.MINDAR.FACE.THREE;
        let mindarThree, scene, camera, renderer, anchor;
        let ringMesh, shaderMaterial;
        let isPressed = false;

        const startButton = document.querySelector("#startButton");
        const startScreen = document.querySelector("#start-screen");
        const uiOverlay = document.querySelector("#ui-overlay");

        // 核心：自定义呼吸光圈着色器
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float uTime;
            uniform float uIntensity;
            varying vec2 vUv;
            void main() {
                float dist = distance(vUv, vec2(0.5));
                // 创建环状柔和渐变
                float ring = smoothstep(0.45, 0.1, dist) - smoothstep(0.5, 0.45, dist);
                float alpha = ring * (0.3 + 0.4 * uIntensity);
                vec3 color = vec3(0.7, 0.85, 1.0); // 治愈系浅蓝色
                gl_FragColor = vec4(color, alpha * (0.5 + 0.5 * sin(uTime * 1.5)));
            }
        `;

        const init = async () => {
            mindarThree = new window.MINDAR.FACE.MindARThree({
                container: document.body,
            });
            ({renderer, scene, camera} = mindarThree);

            // 1. 创建呼吸光圈组件
            const geometry = new THREE.PlaneGeometry(0.8, 0.8);
            shaderMaterial = new THREE.ShaderMaterial({
                transparent: true,
                vertexShader,
                fragmentShader,
                uniforms: {
                    uTime: { value: 0 },
                    uIntensity: { value: 1.0 }
                }
            });

            ringMesh = new THREE.Mesh(geometry, shaderMaterial);
            
            // 锚点设置：在面部下方约 0.5 距离处（模拟胸腔/领口位置）
            anchor = mindarThree.addAnchor(1); // 默认追踪面部
            ringMesh.position.set(0, -0.6, -0.2); 
            anchor.group.add(ringMesh);

            // 交互监听
            window.addEventListener('mousedown', () => { isPressed = true; });
            window.addEventListener('mouseup', () => { isPressed = false; });
            window.addEventListener('touchstart', () => { isPressed = true; });
            window.addEventListener('touchend', () => { isPressed = false; });

            await mindarThree.start();
            
            renderer.setAnimationLoop(() => {
                const t = performance.now() / 1000;
                shaderMaterial.uniforms.uTime.value = t;

                // 2. 呼吸动画逻辑 (4秒一循环)
                const breathScale = 1.0 + Math.sin(t * 1.5) * 0.15;
                ringMesh.scale.set(breathScale, breathScale, 1);

                // 3. 长按交互反馈
                const targetIntensity = isPressed ? 2.5 : 1.0;
                shaderMaterial.uniforms.uIntensity.value += (targetIntensity - shaderMaterial.uniforms.uIntensity.value) * 0.1;
                
                if(isPressed) {
                    ringMesh.scale.multiplyScalar(1.02); // 放大感
                }

                renderer.render(scene, camera);
            });
        };

        startButton.addEventListener('click', () => {
            startScreen.style.opacity = "0";
            setTimeout(() => {
                startScreen.style.display = "none";
                uiOverlay.style.display = "flex";
                init();
            }, 1000);
        });

        // 模拟 15秒后“完成一次放松”
        setTimeout(() => {
            if(uiOverlay.style.display === "flex") {
                document.getElementById('main-hint').innerText = "停留一会";
                setTimeout(() => {
                    document.getElementById('main-hint').innerText = "已完成一次放松引导";
                    ringMesh.visible = false;
                }, 8000);
            }
        }, 15000);

    </script>
</body>
</html>
